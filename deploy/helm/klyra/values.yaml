image:
  repository: ghcr.io/mfeldheim/klyra
  tag: latest
  pullPolicy: Always

replicaCount: 2

service:
  type: ClusterIP
  port: 8080

config: {}  # inline klyra-config YAML — merged into ConfigMap

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

leaderElection:
  leaseName: klyra-leader

namespace: ""  # defaults to release namespace

serviceAccount:
  annotations: {}  # e.g. eks.amazonaws.com/role-arn for IRSA

