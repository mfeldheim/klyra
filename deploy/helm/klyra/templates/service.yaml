apiVersion: v1
kind: Service
metadata:
  name: {{ include "klyra.name" . }}
  namespace: {{ include "klyra.namespace" . }}
  labels: {{ include "klyra.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
  selector: {{ include "klyra.labels" . | nindent 4 }}
