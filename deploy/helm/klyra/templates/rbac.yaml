apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "klyra.name" . }}
  namespace: {{ include "klyra.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "klyra.name" . }}
  namespace: {{ include "klyra.namespace" . }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, create, update]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "klyra.name" . }}
  namespace: {{ include "klyra.namespace" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "klyra.name" . }}
    namespace: {{ include "klyra.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "klyra.name" . }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "klyra.name" . }}-pods
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "klyra.name" . }}-pods
subjects:
  - kind: ServiceAccount
    name: {{ include "klyra.name" . }}
    namespace: {{ include "klyra.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "klyra.name" . }}-pods
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "klyra.name" . }}-nodes
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "klyra.name" . }}-events
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "klyra.name" . }}-nodes
subjects:
  - kind: ServiceAccount
    name: {{ include "klyra.name" . }}
    namespace: {{ include "klyra.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "klyra.name" . }}-nodes
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "klyra.name" . }}-events
subjects:
  - kind: ServiceAccount
    name: {{ include "klyra.name" . }}
    namespace: {{ include "klyra.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "klyra.name" . }}-events
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "klyra.name" . }}-workloads
rules:
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "klyra.name" . }}-workloads
subjects:
  - kind: ServiceAccount
    name: {{ include "klyra.name" . }}
    namespace: {{ include "klyra.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "klyra.name" . }}-workloads
  apiGroup: rbac.authorization.k8s.io
